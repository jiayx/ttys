name: Build Agents

on:
  pull_request:
  push:
    tags:
      - "v*"
    branches:
      - main
  workflow_dispatch:

jobs:
  build-go:
    name: Go ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: agent/go.mod

      - name: Build Go agent
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          asset="ttys-agent-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"

          cd agent
          GOOS="${{ matrix.goos }}" \
          GOARCH="${{ matrix.goarch }}" \
          CGO_ENABLED=0 \
          go build -trimpath -ldflags="-s -w" -o "../dist/${asset}" ./cmd/ttys-agent

      - uses: actions/upload-artifact@v4
        with:
          name: go-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  build-zig:
    name: Zig ${{ matrix.id }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: darwin-amd64
            runner: macos-13
            target: ""
            linux_transport: ""
            ext: ""
            asset: ttys-agent-zig-darwin-amd64
          - id: darwin-arm64
            runner: macos-14
            target: ""
            linux_transport: ""
            ext: ""
            asset: ttys-agent-zig-darwin-arm64
          - id: linux-amd64-system
            runner: ubuntu-latest
            target: ""
            linux_transport: system
            ext: ""
            asset: ttys-agent-zig-linux-amd64-system
          - id: linux-amd64-portable
            runner: ubuntu-latest
            target: x86_64-linux-gnu
            linux_transport: portable
            ext: ""
            asset: ttys-agent-zig-linux-amd64-portable
          - id: linux-arm64-system
            runner: ubuntu-24.04-arm
            target: ""
            linux_transport: system
            ext: ""
            asset: ttys-agent-zig-linux-arm64-system
          - id: linux-arm64-portable
            runner: ubuntu-latest
            target: aarch64-linux-gnu
            linux_transport: portable
            ext: ""
            asset: ttys-agent-zig-linux-arm64-portable
          - id: windows-amd64
            runner: windows-latest
            target: x86_64-windows-gnu
            linux_transport: ""
            ext: ".exe"
            asset: ttys-agent-zig-windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install Linux system dependencies
        if: runner.os == 'Linux' && matrix.linux_transport == 'system'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev

      - name: Build Zig agent
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          cd agent-zig

          args=(
            "--summary"
            "all"
          )

          if [[ -n "${{ matrix.target }}" ]]; then
            args=("-Dtarget=${{ matrix.target }}" "${args[@]}")
          fi

          if [[ -n "${{ matrix.linux_transport }}" ]]; then
            args+=("-Dlinux_transport=${{ matrix.linux_transport }}")
          fi

          export ZIG_GLOBAL_CACHE_DIR="${PWD}/.zig-cache"
          export ZIG_LOCAL_CACHE_DIR="${PWD}/.zig-cache"

          zig build "${args[@]}"

          cp "zig-out/bin/ttys-agent-zig${{ matrix.ext }}" "../dist/${{ matrix.asset }}"

      - uses: actions/upload-artifact@v4
        with:
          name: zig-${{ matrix.id }}
          path: dist/*
          if-no-files-found: error

  bundle-release:
    name: Bundle Release Assets
    runs-on: ubuntu-latest
    needs:
      - build-go
      - build-zig
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum * > checksums.txt

      - uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: dist/*
          if-no-files-found: error

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
